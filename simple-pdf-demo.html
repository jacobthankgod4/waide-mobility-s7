<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple PDF Generation Demo</title>
    <style>
        body {
            background: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            padding: 2rem;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #111;
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid #333;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #00e6ff;
        }
        input {
            width: 100%;
            padding: 0.75rem;
            background: #222;
            border: 1px solid #444;
            color: #fff;
            border-radius: 8px;
            box-sizing: border-box;
        }
        .btn {
            background: linear-gradient(135deg, #00e6ff, #00ff88);
            color: #000;
            border: none;
            padding: 1rem 2rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 1rem;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="color: #00e6ff; text-align: center;">PDF Generation Demo</h1>
        
        <form id="pdfForm">
            <div class="form-group">
                <label for="company">Company Name:</label>
                <input type="text" id="company" value="Demo Company Inc." required>
            </div>
            
            <div class="form-group">
                <label for="currentRevenue">Current Monthly Revenue:</label>
                <input type="text" id="currentRevenue" value="50,000" required>
            </div>
            
            <div class="form-group">
                <label for="projectedRevenue">Projected Monthly Revenue:</label>
                <input type="text" id="projectedRevenue" value="62,500" required>
            </div>
            
            <div class="form-group">
                <label for="roi">ROI Percentage:</label>
                <input type="text" id="roi" value="125" required>
            </div>
            
            <button type="button" class="btn" onclick="generatePDF()">
                🚀 Generate PDF Report
            </button>
        </form>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="pdf-generator.js"></script>
    
    <script>
        function generatePDF() {
            const leadData = {
                company: document.getElementById('company').value,
                currentRevenue: document.getElementById('currentRevenue').value,
                projectedRevenue: document.getElementById('projectedRevenue').value,
                roi: document.getElementById('roi').value
            };
            
            const generator = new WaidePDFGenerator();
            generator.downloadPDF(leadData);
        }
    </script>
</body>
</html>
